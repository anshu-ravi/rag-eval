version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - rag-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-eval-app
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - .env
    volumes:
      - ./results:/app/results
      - ./datasets:/app/datasets
    networks:
      - rag-network
    command: ["--mode", "retrieval", "--output", "results/benchmark.json"]

volumes:
  qdrant_storage:
    driver: local

networks:
  rag-network:
    driver: bridge
